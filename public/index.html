<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Localhost Manager</title>
<style>
  :root {
    --bg: #f6f7f9; --panel: #ffffff; --text: #1a1d21; --muted: #6b7280;
    --border: #e5e7eb; --row-hover: #f3f4f6;
    --active-bg: #dcfce7; --active-fg: #166534;
    --pending-bg: #fef3c7; --pending-fg: #92400e;
    --stale-bg: #fee2e2; --stale-fg: #991b1b;
    --btn-bg: #ffffff; --btn-border: #d1d5db; --btn-danger: #dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101216; --panel: #191c22; --text: #e7e9ec; --muted: #9aa1ab;
      --border: #2a2f38; --row-hover: #20242c;
      --active-bg: #14351f; --active-fg: #6ee7a0;
      --pending-bg: #3a2e10; --pending-fg: #fbbf24;
      --stale-bg: #3b1519; --stale-fg: #f87171;
      --btn-bg: #22262e; --btn-border: #3a404a; --btn-danger: #f87171;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 20px 60px; }
  header { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
  h1 { font-size: 20px; margin: 0; }
  #summary { color: var(--muted); }
  .legend { color: var(--muted); font-size: 12.5px; margin: 0 0 16px; }
  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .toolbar input[type="search"] {
    flex: 1; min-width: 180px; padding: 7px 10px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--panel); color: var(--text); font: inherit;
  }
  .filters { display: flex; gap: 6px; }
  .filters button {
    padding: 6px 12px; border: 1px solid var(--btn-border); border-radius: 999px;
    background: var(--btn-bg); color: var(--text); cursor: pointer; font: inherit; font-size: 13px;
  }
  .filters button.on { border-color: var(--text); font-weight: 600; }
  label.auto { color: var(--muted); font-size: 13px; display: flex; gap: 6px; align-items: center; cursor: pointer; }
  table {
    width: 100%; border-collapse: collapse; background: var(--panel);
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
  }
  thead th {
    text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: .04em;
    color: var(--muted); padding: 10px 12px; border-bottom: 1px solid var(--border);
  }
  tbody td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--row-hover); }
  td.port { font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; }
  td.port a { color: inherit; text-decoration: none; border-bottom: 1px dotted var(--muted); }
  td.port a:hover { border-bottom-style: solid; }
  .http { color: var(--active-fg); font-size: 12px; }
  .cmd { font-weight: 500; }
  .args { color: var(--muted); font-size: 12px; max-width: 380px; overflow: hidden;
          text-overflow: ellipsis; white-space: nowrap; }
  .num { font-variant-numeric: tabular-nums; color: var(--muted); }
  .badge {
    display: inline-block; padding: 2px 10px; border-radius: 999px;
    font-size: 12px; font-weight: 600; cursor: default;
  }
  .badge.active  { background: var(--active-bg);  color: var(--active-fg); }
  .badge.pending { background: var(--pending-bg); color: var(--pending-fg); }
  .badge.stale   { background: var(--stale-bg);   color: var(--stale-fg); }
  .why { display: block; color: var(--muted); font-size: 11.5px; margin-top: 2px; }
  button.kill {
    padding: 5px 12px; border: 1px solid var(--btn-border); border-radius: 7px;
    background: var(--btn-bg); color: var(--btn-danger); font: inherit; font-size: 13px;
    font-weight: 600; cursor: pointer;
  }
  button.kill:hover { border-color: var(--btn-danger); }
  button.kill:disabled { opacity: .45; cursor: not-allowed; }
  .selftag { color: var(--muted); font-size: 12px; font-style: italic; }
  #error { color: var(--stale-fg); margin: 10px 0; display: none; }
  .empty { text-align: center; color: var(--muted); padding: 30px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Localhost Manager</h1>
    <span id="summary">loading…</span>
  </header>
  <p class="legend" id="legend"></p>

  <div class="toolbar">
    <input id="search" type="search" placeholder="Filter by port, process, PID…">
    <div class="filters" id="filters">
      <button data-f="all" class="on">All</button>
      <button data-f="active">Active</button>
      <button data-f="pending">Pending</button>
      <button data-f="stale">Stale</button>
    </div>
    <label class="auto"><input type="checkbox" id="autorefresh" checked> auto-refresh (5s)</label>
  </div>

  <div id="error"></div>

  <table>
    <thead>
      <tr>
        <th>Localhost</th><th>What's running</th><th>PID</th>
        <th>Uptime</th><th>Conns</th><th>CPU%</th><th>Status</th><th></th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<script>
let data = { ports: [], staleHours: 24 };
let filter = 'all';
let query = '';
let killing = new Set();

const $ = (s) => document.querySelector(s);

function fmtUptime(sec) {
  if (sec == null) return '—';
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec / 60) + 'm';
  if (sec < 86400) return Math.floor(sec / 3600) + 'h ' + Math.floor((sec % 3600) / 60) + 'm';
  return Math.floor(sec / 86400) + 'd ' + Math.floor((sec % 86400) / 3600) + 'h';
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function render() {
  const q = query.toLowerCase();
  const rows = data.ports.filter((r) => {
    if (filter !== 'all' && r.status !== filter) return false;
    if (!q) return true;
    return [r.port, r.pid, r.command, r.args, r.user, r.http].join(' ').toLowerCase().includes(q);
  });

  const counts = { active: 0, pending: 0, stale: 0 };
  for (const r of data.ports) counts[r.status]++;
  $('#summary').textContent =
    `${data.ports.length} listening ports — ${counts.active} active, ` +
    `${counts.pending} pending, ${counts.stale} stale`;
  $('#legend').textContent =
    `active = in use now · pending = listening but idle (may be starting/compiling) · ` +
    `stale = up over ${data.staleHours}h or stuck (not accepting connections)`;

  if (rows.length === 0) {
    $('#rows').innerHTML = '<tr><td colspan="8" class="empty">No ports match.</td></tr>';
    return;
  }

  $('#rows').innerHTML = rows.map((r) => {
    const key = r.pid + ':' + r.port;
    const killBtn = r.self
      ? '<span class="selftag">this app</span>'
      : `<button class="kill" data-pid="${r.pid}" data-cmd="${esc(r.command)}"
           data-port="${r.port}" ${r.killable && !killing.has(key) ? '' : 'disabled'}
           title="${r.killable ? 'Send SIGTERM' : 'Owned by ' + esc(r.user) + ' — not killable'}">
           ${killing.has(key) ? '…' : 'Kill'}</button>`;
    const httpLine = r.http ? `<div class="http">${esc(r.http)}</div>` : '';
    return `<tr>
      <td class="port"><a href="http://localhost:${r.port}" target="_blank"
          title="bound to ${esc(r.addrs.join(', '))}">localhost:${r.port}</a></td>
      <td><div class="cmd">${esc(r.command)}</div>${httpLine}
          <div class="args" title="${esc(r.args)}">${esc(r.args)}</div></td>
      <td class="num">${r.pid}</td>
      <td class="num">${fmtUptime(r.uptimeSec)}</td>
      <td class="num">${r.connections}</td>
      <td class="num">${r.cpu.toFixed(1)}</td>
      <td><span class="badge ${r.status}" title="${esc(r.reasons.join('; '))}">${r.status}</span>
          <span class="why">${esc(r.reasons.join('; '))}</span></td>
      <td>${killBtn}</td>
    </tr>`;
  }).join('');
}

async function refresh() {
  try {
    const res = await fetch('/api/ports');
    data = await res.json();
    $('#error').style.display = 'none';
    render();
  } catch (e) {
    $('#error').textContent = 'Failed to reach server: ' + e.message;
    $('#error').style.display = 'block';
  }
}

async function kill(pid, cmd, port) {
  if (!confirm(`Kill ${cmd} (PID ${pid}) on port ${port}?\n\nSends SIGTERM first.`)) return;
  const key = pid + ':' + port;
  killing.add(key);
  render();
  try {
    let res = await fetch('/api/kill', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pid }),
    });
    let out = await res.json();
    if (out.error) throw new Error(out.error);
    if (out.alive && confirm(`${cmd} (PID ${pid}) survived SIGTERM. Force kill with SIGKILL?`)) {
      res = await fetch('/api/kill', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pid, force: true }),
      });
      out = await res.json();
      if (out.error) throw new Error(out.error);
    }
  } catch (e) {
    alert('Kill failed: ' + e.message);
  } finally {
    killing.delete(key);
    await refresh();
  }
}

document.addEventListener('click', (e) => {
  const b = e.target.closest('button');
  if (!b) return;
  if (b.classList.contains('kill')) {
    kill(Number(b.dataset.pid), b.dataset.cmd, Number(b.dataset.port));
  } else if (b.dataset.f) {
    filter = b.dataset.f;
    document.querySelectorAll('#filters button').forEach((x) =>
      x.classList.toggle('on', x === b));
    render();
  }
});
$('#search').addEventListener('input', (e) => { query = e.target.value; render(); });

let timer = setInterval(() => { if ($('#autorefresh').checked) refresh(); }, 5000);
refresh();
</script>
</body>
</html>
